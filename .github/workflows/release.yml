name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    name: Package & publish
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          # package.sh derives the build number from rev-list and the version
          # from the tag, so it needs full history.
          fetch-depth: 0

      - name: Test (release configuration)
        run: swift test -c release --package-path apps/menubar

      - name: Package app + DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          apps/menubar/Scripts/package.sh "$VERSION"
          shasum -a 256 "apps/menubar/dist/TokenMyBar-$VERSION.dmg" | tee "apps/menubar/dist/TokenMyBar-$VERSION.dmg.sha256"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ASSETS=(
            "apps/menubar/dist/TokenMyBar-$VERSION.dmg"
            "apps/menubar/dist/TokenMyBar-$VERSION.dmg.sha256"
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            # Tag was re-pushed: refresh the assets on the existing release.
            gh release upload "$GITHUB_REF_NAME" "${ASSETS[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${ASSETS[@]}" \
              --title "TokenMyBar $VERSION" \
              --generate-notes \
              --notes "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for details."
          fi
